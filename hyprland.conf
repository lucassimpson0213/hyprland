# #######################################################################################
# HYPRLAND CONFIG - REWORKED
# Cleaned up for laptop/dev workflow
# #######################################################################################

################
### MONITORS ###
################

monitor = eDP-1, preferred, auto, 1.25
monitor = HDMI-A-1, preferred, auto, 1.25
monitor = DP-2, preferred, auto, 1.25, transform, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hyprpaper
exec-once = firefox
exec-once = solaar -w hide
# Clipboard history (install wl-clipboard + cliphist first)
# exec-once = wl-paste --type text --watch cliphist store
# exec-once = wl-paste --type image --watch cliphist store

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.97

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1, 10, default
    animation = border,        1, 5.39, easeOutQuint
    animation = windows,       1, 4.79, easeOutQuint
    animation = windowsIn,     1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.49, linear, popin 87%
    animation = fadeIn,        1, 1.73, almostLinear
    animation = fadeOut,       1, 1.46, almostLinear
    animation = fade,          1, 3.03, quick
    animation = layers,        1, 3.81, easeOutQuint
    animation = layersIn,      1, 4, easeOutQuint, fade
    animation = layersOut,     1, 1.5, linear, fade
    animation = fadeLayersIn,  1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces,    1, 3, quick
    animation = workspacesIn,  1, 2.5, quick, fade
    animation = workspacesOut, 1, 2.5, quick, fade
    animation = zoomFactor,    1, 7, quick
}

#########################
### LAYOUTS / BEHAVIOR ###
#########################

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        clickfinger_behavior = yes
        drag_lock = yes
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps / session
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, killactive
bind = $mainMod, M, exit

# Layout / window state
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Cycle windows
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev

# Swap windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window + follow it
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod CTRL, 1, movetoworkspace, 1; workspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod CTRL, 2, movetoworkspace, 2; workspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod CTRL, 3, movetoworkspace, 3; workspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod CTRL, 4, movetoworkspace, 4; workspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod CTRL, 5, movetoworkspace, 5; workspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod CTRL, 6, movetoworkspace, 6; workspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod CTRL, 7, movetoworkspace, 7; workspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod CTRL, 8, movetoworkspace, 8; workspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod CTRL, 9, movetoworkspace, 9; workspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CTRL, 0, movetoworkspace, 10; workspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse / scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots (requires grimblast)
bind = , Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Clipboard history (requires cliphist + wl-clipboard)
bind = $mainMod, D, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
